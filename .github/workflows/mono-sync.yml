name: mono-sync

# Keeps main's vendored repos (registry: mono.config.json) current with their
# upstream default branches. Merges are clean by construction: the vendored
# prefixes are disjoint and mono-main-guard blocks human PRs from touching
# them, so the bot never faces a conflict.
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mono-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync vendored repos
        run: |
          git config user.name "mono-sync[bot]"
          git config user.email "mono-sync[bot]@users.noreply.github.com"
          # registry remotes are SSH; the runner fetches public repos over https
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          node scripts/mono/sync.mjs
      - name: Push
        # This repo carries LFS pointers only (see .lfsconfig). GitHub's
        # pre-receive LFS check (GH008) rejects DIRECT default-branch pushes
        # that reference LFS objects the repo doesn't store — but accepts the
        # identical commits on a topic branch. So: push a staging branch,
        # fast-forward main to it via the API (a ref update of objects the
        # server already accepted), then delete the staging branch.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git lfs uninstall --local 2>/dev/null || true
          SHA=$(git rev-parse HEAD)
          git push --no-verify origin "HEAD:refs/heads/mono-sync-staging"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/heads/main" -f sha="$SHA"
          git push origin --delete mono-sync-staging
