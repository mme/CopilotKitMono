name: unit

on:
  push:
    branches: [main]
    paths:
      - "sdks/community/go/**"
      - ".github/workflows/unit-go-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/community/go/**"
      - ".github/workflows/unit-go-sdk.yml"

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Detect fork PR
        id: fork-check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME}" != "${{ github.repository }}" ]]; then
            echo "prefix=fork-" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.24.4"

      - name: Setup Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ steps.fork-check.outputs.prefix }}${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ steps.fork-check.outputs.prefix }}${{ runner.os }}-go-

      - name: Download dependencies
        working-directory: sdks/community/go
        run: go mod download

      - name: Run tests
        working-directory: sdks/community/go
        run: go test ./... -v
