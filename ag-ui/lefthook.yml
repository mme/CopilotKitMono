output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  parallel: true
  commands:
    check-lfs:
      tags: lfs
      run: |
        # Detect staged files that should be LFS-tracked but were added as raw blobs.
        # This happens when a file matching an LFS pattern in .gitattributes is committed
        # without the LFS clean filter converting it to a pointer.
        BAD_FILES=""
        for file in $(git diff --cached --name-only --diff-filter=ACM); do
          FILTER=$(git check-attr filter -- "$file" | sed 's/.*: //')
          if [ "$FILTER" = "lfs" ]; then
            BLOB_ID=$(git ls-files -s -- "$file" | awk '{print $2}')
            HEADER=$(git cat-file -p "$BLOB_ID" | head -c 20)
            if [ "$HEADER" != "version https://git-" ]; then
              BAD_FILES="$BAD_FILES\n  $file"
            fi
          fi
        done
        if [ -n "$BAD_FILES" ]; then
          echo "Error: these files should be tracked by Git LFS but were staged as raw blobs:$BAD_FILES"
          echo ""
          echo "Fix: git rm --cached <file> && git add <file>"
          echo "Make sure git-lfs is installed and 'git lfs install' has been run."
          exit 1
        fi
    sync-lockfile:
      tags: lockfile
      glob: "**/package.json"
      run: pnpm i --lockfile-only
      stage_fixed: true
    generate-dojo-content:
      tags: dojo
      glob: "apps/dojo/**"
      run: pnpm --filter demo-viewer run generate-content-json
      stage_fixed: true
    lint-fix:
      tags: lint
      run: pnpm run lint --fix && pnpm run format
      stage_fixed: true
    test-and-check-packages:
      tags: test-packages
      env:
        NX_TUI: "false"
      run: pnpm run test && pnpm run test:exports

pre-push:
  commands:
    check-binaries:
      tags: binaries
      run: |
        BINARY_FILES=$(git diff --name-only --diff-filter=ACM HEAD@{push}.. 2>/dev/null | grep -iE '\.(exe|dll|so|dylib|o|obj|a|lib|wasm|dSYM)$|/build/|\.dSYM/' || true)
        if [ -n "$BINARY_FILES" ]; then
          echo "Error: binary or build artifacts detected in push:"
          echo "$BINARY_FILES"
          exit 1
        fi
